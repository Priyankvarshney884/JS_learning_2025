<!DOCTYPE html>
<html>
<!-- Please NOTE that the link to assets (like images) need to be set in global context.
For example:
To access an image from assets folder correct way to set src attribute is 

src = 'profile.png'

instead of 

src = './assets/profile.png'
-->

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
</head>

<body>
    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
        <li>5</li>
        <li>6</li>
        <li>8</li>
        <li>9</li>
        <li>10</li>
    </ul>

</body>

<script>
    const listItems = document.querySelectorAll('ul li');
    const numbers = Array.from(listItems).map(li => Number(li.textContent));

    let missing = -1;
    for (let i = 1; i <= 10; i++) {
        if (!numbers.includes(i)) {
            missing = i;
            break;
        }
    }

    if (missing !== -1) {
        const ul = document.querySelector('ul');
        for (let i = 0; i < listItems.length; i++) {
            const val = Number(listItems[i].textContent);
            if (val > missing) {
                const newLi = document.createElement('li');
                newLi.textContent = missing;
                ul.insertBefore(newLi, listItems[i]);
                break;
            }
        }
    }
</script>


</html>
