<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
          
        }

        .cell {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            cursor: pointer;
            user-select: none;
            border: 1px solid black;
        }

        .light {
            background-color: white;
        }

        .dark {
            background-color: black;
        }

        .highlight {
            background-color: rgba(0, 255, 0, 0.5) !important;
        }

        .selected {
            background-color: rgba(255, 255, 0, 0.5) !important;
        }
    </style>
</head>
<body>
  <div class="container">

  </div>  

  <script>
    const containerRef = document.querySelector('.container');
    const boardFragment = document.createDocumentFragment();

    for(let i =0;i<8;i++){
         let rowRef = document.createElement('div');
         for(let j=0;j<8;j++)
         {
            let cellRef = document.createElement('div');
            cellRef.classList.add('cell');
            if((i+j)%2===0){
                cellRef.classList.add('light');
            }else{
                cellRef.classList.add('dark');
            }
            rowRef.appendChild(cellRef);
         }
         boardFragment.appendChild(rowRef);
    }
    containerRef.appendChild(boardFragment);
  </script>
</body>
</html>
