<!DOCTYPE html>
<html lang="en">
<!-- Please NOTE that the link to assets (like images) need to be set in global context.
For example:
To access an image from assets folder correct way to set src attribute is 

src = 'profile.png'

instead of 

src = './assets/profile.png'
-->

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticket Management App</title>

    <link rel="stylesheet" href="style.css">


</head>

<body>
    <div class="container">
        <div id="inputs" class="inputs">
            <input class="input" type="text" inputmode="numeric" maxlength="1" />
            <input class="input" type="text" inputmode="numeric" maxlength="1" />
            <input class="input" type="text" inputmode="numeric" maxlength="1" />
            <input class="input" type="text" inputmode="numeric" maxlength="1" />
        </div>
    </div>
    <!-- <script src="script.js"></script> -->
     <script>
        const inputs = document.querySelectorAll('.input');

        inputs.forEach((input, index)=>{
            input.addEventListener('input', (e)=>{
                const val= e.target.value;
                if(val.length>1 || (val === '' || isNaN(val))){
                    e.target.value = '';
                    return;
                }
                if(val && input.nextElementSibling){
                    input.nextElementSibling.focus();
                }   
            });

            input.addEventListener('keydown', (e)=>{
                if(e.key === 'Backspace' && !input.value && input.previousElementSibling){
                    input.previousElementSibling.focus();
                }
            });
        })
     </script>
</body>

</html>
