<!DOCTYPE html>
<html>
<!-- Please NOTE that the link to assets (like images) need to be set in global context.
For example:
To access an image from assets folder correct way to set src attribute is 

src = 'profile.png'

instead of 

src = './assets/profile.png'
-->

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
</head>

<body>
    <div id="doubleHolder">
        <button class="double">double</button>
    </div>

    <script>
       
        const containerRef = document.getElementById("doubleHolder");
        containerRef.addEventListener('click',((e)=>{
            if(e.target && e.target.classList.contains('double')){
                e.target.remove();

                for(let i=0;i<2;i++)
                {
                    const newButton= document.createElement('button');
                    newButton.className="double";
                    newButton.textContent="double";
                    containerRef.appendChild(newButton);
                }
            }
        }));

    </script>
</body>

</html>
